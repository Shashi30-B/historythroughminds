<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="travolor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E90FF" />
      <stop offset="100%" stop-color="#000080" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="100" height="100" rx="28" fill="url(#travolor-grad)" />

  <!-- Navigation Grid / Globe lines (abstract background) -->
  <circle cx="50" cy="50" r="32" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2" fill="none" />
  <path d="M18 50 H82" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />
  <path d="M50 18 V82" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />

  <!-- Premium Map Pin & Jetliner theme -->
  <g filter="url(#shadow)">
    <!-- Map Pin Shape -->
    <path d="M50 20 C38 20 28 30 28 42 C28 58 50 78 50 78 C50 78 72 58 72 42 C72 30 62 20 50 20 Z" fill="#FFFFFF" />
    
    <!-- Outer accent drop/ring inside pin -->
    <circle cx="50" cy="42" r="14" fill="#1E90FF" />
    
    <!-- Minimalist Travel Flight Icon -->
    <path d="M50 32 L53 39 L61 40 L55 45 L57 52 L50 48 L43 52 L45 45 L39 40 L47 39 Z" fill="#FFFFFF" />
  </g>

  <!-- Ground wave / Pathway curves below pin -->
  <path d="M26 82 C38 78 62 78 74 82" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="4" stroke-linecap="round" />
</svg>
